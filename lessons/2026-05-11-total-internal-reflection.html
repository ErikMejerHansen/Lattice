<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TIR viz</title>
<style>
:root {
  --bg: #f4eee2;
  --bg-raised: #faf5e9;
  --text: #1a1a18;
  --text-muted: #6b6359;
  --text-ghost: #a89e90;
  --accent: #9c3a22;
  --accent-soft: #c47558;
  --border: #d8cfb8;
  --border-strong: #b8ac8e;
}
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Source Serif 4", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  font-size: 15px;
  line-height: 1.5;
}
.viz-caption {
  font-style: italic; font-size: 12px; color: var(--text-muted);
}
.viz-slider-row {
  display: flex; align-items: center; gap: 10px; margin-top: 12px;
}
.viz-slider-row input[type=range] { flex: 1; accent-color: var(--accent); }
.viz-slider-row label {
  font-style: italic; font-size: 13px; color: var(--text-muted); min-width: 28px;
}
.viz-slider-row .value {
  font-family: "IBM Plex Mono", "SF Mono", Menlo, monospace;
  font-size: 11px; color: var(--text); min-width: 60px; text-align: right;
}
.readout {
  display: flex; justify-content: space-between; gap: 16px;
  margin-top: 10px;
  font-family: "IBM Plex Mono", "SF Mono", Menlo, monospace;
  font-size: 12px; color: var(--text);
}
.readout .label { color: var(--text-muted); font-style: italic; font-family: "Source Serif 4", serif; }
.tir-flag {
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px; padding: 2px 6px; border-radius: 2px;
  background: var(--bg-raised); border: 1px solid var(--border);
  color: var(--text-muted);
}
.tir-flag.on {
  background: var(--accent); color: var(--bg); border-color: var(--accent);
}
</style>
</head>
<body>
<div id="viz" style="padding: 14px 16px;">
  <svg id="scene" viewBox="0 0 420 280" width="100%" height="280" style="display:block; background: var(--bg);">
    <!-- glass region (bottom half) -->
    <rect x="0" y="140" width="420" height="140" fill="#eae1c4" opacity="0.55"/>
    <!-- interface line -->
    <line x1="0" y1="140" x2="420" y2="140" stroke="var(--border-strong)" stroke-width="1.2"/>
    <!-- labels -->
    <text x="10" y="22" font-family="IBM Plex Mono, monospace" font-size="11" fill="var(--text-muted)">air, n₂ = 1.00</text>
    <text x="10" y="270" font-family="IBM Plex Mono, monospace" font-size="11" fill="var(--text-muted)">glass, n₁ = 1.50</text>
    <!-- normal -->
    <line id="normal" x1="210" y1="20" x2="210" y2="260" stroke="var(--text-ghost)" stroke-width="0.8" stroke-dasharray="3 3"/>
    <!-- rays drawn dynamically -->
    <line id="incident" stroke="var(--accent)" stroke-width="2"/>
    <line id="reflected" stroke="var(--accent-soft)" stroke-width="2"/>
    <line id="refracted" stroke="var(--accent)" stroke-width="2"/>
    <!-- arrowhead markers via small triangles drawn dynamically -->
    <polygon id="inc-arrow" fill="var(--accent)"/>
    <polygon id="ref-arrow" fill="var(--accent-soft)"/>
    <polygon id="rfr-arrow" fill="var(--accent)"/>
    <!-- angle arc inside glass -->
    <path id="theta1-arc" fill="none" stroke="var(--text-muted)" stroke-width="0.8"/>
    <text id="theta1-label" font-family="IBM Plex Mono, monospace" font-size="10" fill="var(--text-muted)"></text>
    <!-- angle arc in air -->
    <path id="theta2-arc" fill="none" stroke="var(--text-muted)" stroke-width="0.8"/>
    <text id="theta2-label" font-family="IBM Plex Mono, monospace" font-size="10" fill="var(--text-muted)"></text>
  </svg>

  <div class="viz-slider-row">
    <label for="angle">θ₁</label>
    <input type="range" id="angle" min="0" max="80" step="0.5" value="30">
    <span class="value" id="angle-val">30.0°</span>
  </div>

  <div class="readout">
    <div><span class="label">critical θ_c =</span> <span id="theta-c">41.8°</span></div>
    <div><span class="label">refracted θ₂ =</span> <span id="theta-2">—</span></div>
    <div><span id="tir" class="tir-flag">no TIR</span></div>
  </div>

  <p class="viz-caption" style="margin-top: 10px;">
    Drag the slider to vary the angle of incidence θ₁ inside the glass. Below 41.8° a refracted ray escapes into the air. Past 41.8° the air goes dark and 100% of the energy reflects back into the glass.
  </p>
</div>

<script>
(function() {
  const n1 = 1.50, n2 = 1.00;
  const thetaC = Math.asin(n2 / n1) * 180 / Math.PI;
  const cx = 210, cy = 140;
  const len = 110;

  document.getElementById("theta-c").textContent = thetaC.toFixed(1) + "°";

  function setLine(el, x1, y1, x2, y2) {
    el.setAttribute("x1", x1); el.setAttribute("y1", y1);
    el.setAttribute("x2", x2); el.setAttribute("y2", y2);
  }

  function arrowAt(poly, x, y, dx, dy, color) {
    const m = Math.hypot(dx, dy) || 1;
    const ux = dx / m, uy = dy / m;
    const px = -uy, py = ux;
    const tipX = x, tipY = y;
    const baseX = x - ux * 9, baseY = y - uy * 9;
    const leftX = baseX + px * 4, leftY = baseY + py * 4;
    const rightX = baseX - px * 4, rightY = baseY - py * 4;
    poly.setAttribute("points", `${tipX},${tipY} ${leftX},${leftY} ${rightX},${rightY}`);
    if (color) poly.setAttribute("fill", color);
  }

  function arc(path, label, cx, cy, angleDeg, radius, side, aboveBelow) {
    // side: +1 right of normal, -1 left
    // aboveBelow: 'above' draws arc in air, 'below' in glass
    const a = angleDeg * Math.PI / 180;
    const sign = aboveBelow === 'above' ? -1 : 1;
    const startX = cx;
    const startY = cy + sign * radius;
    const endX = cx + side * radius * Math.sin(a);
    const endY = cy + sign * radius * Math.cos(a);
    const sweep = side > 0 ? (sign > 0 ? 1 : 0) : (sign > 0 ? 0 : 1);
    path.setAttribute("d", `M ${startX} ${startY} A ${radius} ${radius} 0 0 ${sweep} ${endX} ${endY}`);
    const mid = a / 2;
    const labelR = radius + 9;
    label.setAttribute("x", cx + side * labelR * Math.sin(mid));
    label.setAttribute("y", cy + sign * labelR * Math.cos(mid) + 3);
    label.setAttribute("text-anchor", "middle");
  }

  function draw(theta1Deg) {
    const t1 = theta1Deg * Math.PI / 180;
    document.getElementById("angle-val").textContent = theta1Deg.toFixed(1) + "°";

    // incident ray: from lower-left, going up-right toward the interface point
    const ix = cx - len * Math.sin(t1);
    const iy = cy + len * Math.cos(t1);
    setLine(document.getElementById("incident"), ix, iy, cx, cy);
    arrowAt(document.getElementById("inc-arrow"), cx, cy, cx - ix, cy - iy, "var(--accent)");

    // reflected ray: mirrored across the normal, going down-right
    const rx = cx + len * Math.sin(t1);
    const ry = cy + len * Math.cos(t1);
    setLine(document.getElementById("reflected"), cx, cy, rx, ry);
    arrowAt(document.getElementById("ref-arrow"), rx, ry, rx - cx, ry - cy, "var(--accent-soft)");

    // angle arc inside glass
    arc(
      document.getElementById("theta1-arc"),
      document.getElementById("theta1-label"),
      cx, cy, theta1Deg, 26, -1, "below"
    );
    document.getElementById("theta1-label").textContent = "θ₁";

    // refracted ray: only if not TIR
    const sinT2 = (n1 / n2) * Math.sin(t1);
    const isTIR = sinT2 >= 1;
    const refracted = document.getElementById("refracted");
    const rfrArrow = document.getElementById("rfr-arrow");
    const t2arc = document.getElementById("theta2-arc");
    const t2label = document.getElementById("theta2-label");
    const tirEl = document.getElementById("tir");
    const t2Out = document.getElementById("theta-2");

    if (!isTIR) {
      const t2 = Math.asin(sinT2);
      const fx = cx + len * Math.sin(t2);
      const fy = cy - len * Math.cos(t2);
      setLine(refracted, cx, cy, fx, fy);
      refracted.setAttribute("opacity", "1");
      arrowAt(rfrArrow, fx, fy, fx - cx, fy - cy, "var(--accent)");
      rfrArrow.setAttribute("opacity", "1");
      arc(t2arc, t2label, cx, cy, t2 * 180 / Math.PI, 26, 1, "above");
      t2label.textContent = "θ₂";
      t2label.setAttribute("opacity", "1");
      t2arc.setAttribute("opacity", "1");
      t2Out.textContent = (t2 * 180 / Math.PI).toFixed(1) + "°";
      tirEl.textContent = "no TIR";
      tirEl.classList.remove("on");
    } else {
      refracted.setAttribute("opacity", "0");
      rfrArrow.setAttribute("opacity", "0");
      t2arc.setAttribute("opacity", "0");
      t2label.setAttribute("opacity", "0");
      t2Out.textContent = "— (TIR)";
      tirEl.textContent = "TIR (θ₁ ≥ θ_c)";
      tirEl.classList.add("on");
    }
  }

  const slider = document.getElementById("angle");
  slider.addEventListener("input", e => draw(parseFloat(e.target.value)));
  draw(30);
})();
</script>
</body>
</html>
